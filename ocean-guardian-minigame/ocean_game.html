<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Lilita+One&family=Quicksand:wght@400;500;600;700&family=Silkscreen&family=Titan+One&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#8ecae6}
canvas{display:block;width:100%;height:100%}
.scr{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(165deg,rgba(8,32,72,0.92) 0%,rgba(12,55,95,0.88) 45%,rgba(8,40,78,0.92) 100%);backdrop-filter:blur(14px)}

.scr h1{font:900 30px/1 'Segoe UI','Helvetica Neue',Arial,sans-serif;color:#a8d8f0;letter-spacing:3px;margin-bottom:5px}
.sub{font:400 11px/1 'Helvetica Neue',Arial,sans-serif;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:22px}
.ss-inner{max-width:520px;width:100%;animation:ssIn .55s ease-out}
@keyframes ssIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.ss-head{text-align:center;margin-bottom:20px}
#ss .ss-title{font:900 clamp(26px,5vw,34px)/1.05 'Segoe UI',system-ui,sans-serif;background:linear-gradient(180deg,#0a4a78 0%,#1a6aa8 40%,#2e8bc8 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;filter:drop-shadow(0 1px 0 rgba(255,255,255,0.85));letter-spacing:.12em;margin:0 0 8px}
.ss-sub{font:500 11px/1.5 'Segoe UI',sans-serif;color:rgba(200,225,245,0.55);letter-spacing:.14em;text-transform:uppercase;margin:0}
#ss .ss-sub{color:rgba(45,75,105,0.78)}
.ss-panel{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:14px 14px 16px;margin-bottom:12px;box-shadow:0 8px 32px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.06)}
#ss .ss-panel{background:rgba(255,255,255,0.82);border:1px solid rgba(80,140,190,0.32);box-shadow:0 10px 36px rgba(30,90,130,0.12),inset 0 1px 0 rgba(255,255,255,0.98)}
.ss-panel-h{font:800 10px/1 'Segoe UI',sans-serif;color:rgba(180,210,235,0.75);text-transform:uppercase;letter-spacing:.18em;margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.08)}
#ss .ss-panel-h{color:rgba(35,70,100,0.88);border-bottom-color:rgba(0,80,130,0.14)}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.15)}
#ss .cgrid{border-color:rgba(70,120,160,0.3);background:rgba(255,255,255,0.58)}
.cc{padding:10px 8px;border-right:1px solid rgba(255,255,255,0.08)}
#ss .cc{border-right-color:rgba(70,120,160,0.22)}
.cc:last-child{border-right:none}
.cn{font:700 11px/1 'Helvetica Neue',Arial,sans-serif;margin-bottom:8px}
#ss .cn{text-shadow:0 1px 0 rgba(255,255,255,0.95)}
.ss-keys{display:flex;flex-direction:column;gap:5px}
.ss-row{display:flex;align-items:center;justify-content:space-between;gap:6px;font:600 9px 'Segoe UI',sans-serif;color:rgba(255,255,255,0.5)}
#ss .ss-row{color:rgba(40,65,95,0.82)}
.ss-row .kbd{font-size:9px;padding:2px 5px;min-width:auto}
.ss-lbl-act{color:#ffb090}
.ss-lbl-grd{color:#7ec8e8}
#ss .ss-lbl-act{color:#a02806;font-weight:800}
#ss .ss-lbl-grd{color:#065a7a;font-weight:800}
.cr{font:400 10px/1.6 'Helvetica Neue',Arial,sans-serif;color:rgba(255,255,255,0.45)}
.cr b{color:rgba(255,255,255,0.9)}
.ss-flow{list-style:none;margin:0;padding:0}
.ss-f{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.07)}
#ss .ss-f{border-bottom-color:rgba(0,80,130,0.12)}
.ss-f:last-child{border-bottom:none;padding-bottom:0}
.ss-f:first-child{padding-top:0}
.ss-f-ic{font-size:22px;line-height:1;flex:0 0 28px;text-align:center;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
#ss .ss-f-ic{filter:drop-shadow(0 1px 1px rgba(255,255,255,0.9))}
.ss-f-txt{font:500 11px/1.5 'Segoe UI',system-ui,sans-serif;color:rgba(235,245,255,0.88);margin:0}
#ss .ss-f-txt{color:rgba(25,45,70,0.94)}
.ss-f-txt strong{color:#fff;font-weight:700}
#ss .ss-f-txt strong{color:#0d3048}
.ss-f-txt .gh-c-act,.ss-f-txt .gh-c-grd{font:inherit;letter-spacing:.02em}
#ss .ss-f-txt .gh-c-act{color:#a02806;font-weight:800}
#ss .ss-f-txt .gh-c-grd{color:#065a7a;font-weight:800}
.gbtn{padding:13px 48px;border:none;background:linear-gradient(180deg,#5ad0a8,#2a9880);color:#fff;font:800 14px/1 'Segoe UI',sans-serif;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:12px;box-shadow:0 4px 20px rgba(42,152,128,0.45),inset 0 1px 0 rgba(255,255,255,0.25);transition:transform .15s,box-shadow .2s,filter .2s}
.gbtn:hover{filter:brightness(1.08);box-shadow:0 6px 28px rgba(42,152,128,0.55);transform:translateY(-1px)}
.gbtn:active{transform:translateY(0)}
#ss .gbtn{margin-top:6px;width:100%;max-width:280px;margin-left:auto;margin-right:auto;display:block}
#es .gbtn,#mgs .gbtn{background:rgba(255,255,255,0.9);color:#23506e;border:1.5px solid rgba(120,170,205,0.7);box-shadow:0 4px 12px rgba(20,60,90,.12);text-transform:none;letter-spacing:2px;padding:11px 40px;border-radius:10px;width:auto;max-width:none}
#es .gbtn:hover,#mgs .gbtn:hover{filter:none;background:#ffffff}
#es.scr{background:url('assets/resultbg.png') center/cover no-repeat;backdrop-filter:none;overflow-y:auto}
.res-wrap{width:min(1100px,96vw);max-height:none;padding:18px 22px 20px;border-radius:24px;display:flex;flex-direction:column;gap:0;background:transparent}
.res-top-title{flex:0 0 auto;font:900 clamp(26px,4vw,52px)/1.1 'Fredoka','Segoe UI',sans-serif;color:#1a7694;text-align:center;text-shadow:0 2px 0 rgba(255,255,255,.6);margin:0 0 4px;padding:4px 0}
.res-podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:clamp(16px,2.5vw,28px);align-items:end;padding:72px 12px 0;margin-bottom:0}
.res-card{position:relative;border-radius:20px;overflow:visible;box-shadow:0 10px 22px rgba(16,48,78,.2);margin:0 6px;background:#fff}
.res-card.rank1{transform:translateY(-14px)}
.res-head{height:90px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font:900 52px/1 'Fredoka','Segoe UI',sans-serif;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.16);border-radius:20px 20px 0 0}
.res-card.rank1 .res-head{background:#e5c44f}
.res-card.rank2 .res-head{background:#c8cdc6}
.res-card.rank3 .res-head{background:#c39669}
.res-body{background:#ffffff;padding:12px 14px 12px;border:1px solid rgba(115,150,180,.22);border-top:none;border-radius:0 0 20px 20px}
.res-avatar{position:absolute;left:50%;top:-52px;transform:translateX(-50%);width:90px;height:90px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:transparent;z-index:5}
.res-avatar img{width:100%;height:100%;object-fit:contain;display:block}
.res-badges{display:flex;justify-content:center;gap:5px;min-height:24px;margin-bottom:6px;flex-wrap:wrap}
.res-badge{padding:3px 8px;border-radius:999px;font:700 11px/1 'Segoe UI',sans-serif;border:2px solid}
.res-badge.eco{color:#067a46;background:#e8ffe9;border-color:#22b573}
.res-badge.over{color:#b3133a;background:#ffe6ec;border-color:#f17098}
.res-pname{font:800 22px/1 'Fredoka','Segoe UI',sans-serif;text-align:center;margin:0 0 6px}
.res-money{font:900 42px/1 'Fredoka','Segoe UI',sans-serif;color:#be7c00;text-align:center;margin:0}
.res-basemoney{font:600 12px/1.4 'Segoe UI',sans-serif;text-align:center;color:#888;margin:2px 0 0}
.res-moral{font:700 15px/1 'Segoe UI',sans-serif;text-align:center;color:#48626f;margin:4px 0 8px}
.res-mini{display:flex;justify-content:space-around;font:600 13px/1.2 'Segoe UI',sans-serif;color:#30444e}
.res-mini b{display:block;font-size:20px;margin-bottom:2px}
.res-row4{display:grid;grid-template-columns:64px 80px 1fr auto 110px 110px 110px;align-items:center;gap:10px;padding:12px 18px;border-radius:16px;background:#ffffff;border:1px solid rgba(120,160,190,.28);box-shadow:0 4px 14px rgba(0,40,70,.1);margin:16px 10px 0;flex:0 0 auto}
.res-row4-rank{font:900 28px/1 'Fredoka','Segoe UI',sans-serif;color:#3e4e53;text-align:center}
.res-row4-avatar{width:64px;height:64px;border-radius:10px;background:transparent;display:flex;align-items:center;justify-content:center}
.res-row4-avatar img{width:100%;height:100%;object-fit:contain;display:block}
.res-row4-name{font:800 20px/1 'Fredoka','Segoe UI',sans-serif}
.res-row4-money{font:900 34px/1 'Fredoka','Segoe UI',sans-serif;color:#be7c00;text-align:center;white-space:nowrap}
.res-row4-moral,.res-row4-st,.res-row4-rel{font:700 18px/1.1 'Segoe UI',sans-serif;color:#405861;text-align:center}
.res-row4-lbl{display:block;font-size:11px;color:#6d8390;font-weight:700}
.res-actions{display:flex;justify-content:center;margin-top:18px;padding-bottom:6px}
.mgbars{display:flex;gap:28px;align-items:flex-end;height:88px;margin-bottom:14px}
.mgbw{display:flex;flex-direction:column;align-items:center;gap:7px}
.mgbg{width:54px;height:76px;background:rgba(255,255,255,0.08);border-radius:8px;display:flex;align-items:flex-end;overflow:hidden;border:1px solid rgba(255,255,255,0.12)}
.mgbf{width:100%;border-radius:6px;transition:height .07s}
.mgbl{font:700 11px/1 'Helvetica Neue',Arial,sans-serif}
#mgcnt{font:900 42px/1 'Helvetica Neue',Arial,sans-serif;color:#ff6b6b;letter-spacing:4px}
#ann{position:fixed;top:86px;left:50%;transform:translateX(-50%);z-index:40;pointer-events:none;white-space:nowrap}
#annbox{display:none;background:rgba(255,255,255,0.96);border-radius:20px;padding:7px 20px;font:700 12px/1 'Segoe UI',Arial,sans-serif;box-shadow:0 4px 18px rgba(0,0,0,0.14);animation:annPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes annPop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.game-help{position:fixed;left:10px;top:74px;z-index:35;max-width:min(318px,calc(100vw - 20px));font:11px/1.45 'Segoe UI',system-ui,sans-serif;pointer-events:auto;animation:helpSlide .45s ease-out}
@keyframes helpSlide{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
.game-help.collapsed .gh-body{display:none}
.game-help.collapsed .gh-toggle::after{content:'▸'}
.gh-toggle{width:100%;text-align:left;padding:8px 12px;border:1px solid rgba(255,255,255,0.35);border-radius:10px;background:rgba(15,45,75,0.82);color:#c8e8ff;font:700 11px 'Segoe UI',sans-serif;letter-spacing:.06em;cursor:pointer;backdrop-filter:blur(8px);transition:background .2s,transform .15s}
.gh-toggle:hover{background:rgba(25,60,100,0.9)}
.gh-toggle:active{transform:scale(.98)}
.gh-toggle::after{content:'▾';float:right;opacity:.7}
.gh-body{margin-top:6px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.94);border:1px solid rgba(180,210,230,0.85);box-shadow:0 8px 28px rgba(20,60,100,0.18)}
.gh-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-bottom:10px}
.gh-p{font:700 10px/1.2 sans-serif;margin-bottom:4px}
.gh-p.p0{color:#e88888}.gh-p.p1{color:#6a9fd4}.gh-p.p2{color:#7bc99a}.gh-p.p3{color:#e8a86e}
.gh-flow{font:10.5px/1.55 'Segoe UI',system-ui,sans-serif;color:#2a3540;margin-bottom:10px}
.gh-goal{margin:0 0 8px;padding-bottom:8px;border-bottom:1px solid rgba(0,0,0,.07);font-weight:600}
.gh-flow-line{margin:0 0 6px}
.gh-flow-line:last-child{margin-bottom:0}
.gh-flow-line b{color:#0d3048;font-weight:800}
.gh-c-act{color:#c43d18;font-weight:800}
.gh-c-grd{color:#156a90;font-weight:800}
.gh-keys{margin-top:0;padding-top:10px;border-top:1px solid rgba(0,0,0,0.07)}
.gh-keys-cap{font:800 9px sans-serif;color:#0d5a7a;text-transform:uppercase;letter-spacing:.04em;margin:0 0 6px}
.kbd{display:inline-block;font:800 10px/1.1 'Segoe UI','Consolas',monospace;padding:3px 7px;border-radius:6px;text-align:center;min-width:1.6em;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.kbd-mv{background:#e8eef4;color:#2a3848;border:1px solid #c5d0dc}
.kbd-act{background:linear-gradient(180deg,#ff9a6a,#e85a28);color:#fff;border:1px solid #c04018;text-shadow:0 1px 0 rgba(0,0,0,.15)}
.kbd-grd{background:linear-gradient(180deg,#5eb8e0,#2a8ab8);color:#fff;border:1px solid #1a6a90;text-shadow:0 1px 0 rgba(0,0,0,.15)}
.kbd-pad{font-size:8px;padding:2px 5px;min-width:auto;letter-spacing:-0.02em}
.ss-gp-note{font:500 9px/1.35 'Segoe UI',system-ui,sans-serif;color:rgba(45,75,105,0.72);margin-top:10px;text-align:center;max-width:480px;margin-left:auto;margin-right:auto}
.gh-pl{display:flex;flex-wrap:wrap;align-items:center;gap:5px 8px;margin-top:4px}
.gh-pcell{margin-bottom:8px}
.gh-pcell:last-child{margin-bottom:0}
.gh-pcell .gh-p{margin-bottom:3px}
.gh-key-cap{font:600 8px sans-serif;color:#5a6a78;text-transform:uppercase;letter-spacing:.02em;margin-right:2px}
.gh-keygrp{display:inline-flex;align-items:center;gap:3px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<audio id="bgm" preload="auto" src="assets/bgm.mp3"></audio>
<div id="ann"><div id="annbox"></div></div>


<div class="scr" id="ss">

    <div class="day-bg" aria-hidden="true"></div>
    <div class="grain-texture" aria-hidden="true"></div>
    <div class="cloud cloud-1"></div>

// Island geometry
function IC(){
  var rx=Math.min(W*0.36,420),ry=Math.min(H*0.31,230);
  return{x:W/2,y:H*0.57,rx:rx,ry:ry};
}
// Invisible island/ocean split (no drawing). islandTune matches tuned ellipse; use inIsland / inOcean for rules.
var islandTune={boundSq:1.131,rxM:1.193,ryM:0.823,cx:-1,cy:-54};
function islandCenter(){
  var ic=IC();
  return{x:ic.x+islandTune.cx,y:ic.y+islandTune.cy,rx:ic.rx*islandTune.rxM,ry:ic.ry*islandTune.ryM};
}
function inIsland(px,py){
  var o=islandCenter();
  var dx=(px-o.x)/o.rx,dy=(py-o.y)/o.ry;
  return dx*dx+dy*dy<=islandTune.boundSq;
}
function inOcean(px,py){return !inIsland(px,py);}
function buildY(){var ic=IC();return ic.y-ic.ry*0.36;}
function inIslandOpen(px,py){return inIsland(px,py)&&!inMarket(px,py)&&!inKitchen(px,py);}
function inMarket(px,py){return py<buildY()&&inIsland(px,py)&&px<W/2;}
function inKitchen(px,py){return py<buildY()&&inIsland(px,py)&&px>=W/2;}
function inZone(pi,px,py){
  if(!inIsland(px,py))return false;
  var ic=IC(),by=buildY(),divY=ic.y+ic.ry*0.12;
  if(py<by)return false;
  var lft=px<ic.x,top=py<divY;
  return(pi===0&&lft&&top)||(pi===1&&!lft&&top)||(pi===2&&lft&&!top)||(pi===3&&!lft&&!top);
}
function zc(pi){
  var ic=IC(),by=buildY(),divY=ic.y+ic.ry*0.12,bot=ic.y+ic.ry*0.72;
  var mt=(by+divY)/2,mb=(divY+bot)/2,xl=ic.x-ic.rx*0.46,xr=ic.x+ic.rx*0.46;
  if(pi===0)return{x:xl,y:mt};if(pi===1)return{x:xr,y:mt};
  if(pi===2)return{x:xl,y:mb};return{x:xr,y:mb};
}
function pp(pi,idx){

}

function _burst(x,y,n,cols,spdMin,spdMax,vyBias,gravV,lifeMin,lifeMax,rMin,rMax){
  for(var k=0;k<n;k++){

      col:cols[Math.floor(Math.random()*cols.length)]});

}

function updateParticles(dt){
  for(var k=particles.length-1;k>=0;k--){
    var p=particles[k];
    p.life-=dt/p.maxLife;
    if(p.life<=0){particles.splice(k,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.grav*dt;
    if(p.tp==='dust')p.r+=p.dr*dt;
  }
}

function drawParticleLayer(tp){
  for(var k=0;k<particles.length;k++){
    var p=particles[k];if(p.tp!==tp)continue;
    var al=p.life*(tp==='dust'?0.62:0.88);if(al<=0)continue;
    C.save();C.globalAlpha=al;C.fillStyle=p.col;
    C.beginPath();
    if(tp==='dust')C.ellipse(p.x,p.y,Math.max(0.5,p.r*1.55),Math.max(0.5,p.r*0.8),0,0,Math.PI*2);
    else C.arc(p.x,p.y,Math.max(0.5,p.r),0,Math.PI*2);
    C.fill();C.restore();
  }
}

function genSW(){
  // Used only when releasing fish (addSW). Spawns one seaweed near island shore.
  var o=islandCenter();
  var boundR=Math.sqrt(islandTune.boundSq);
  var rMin=boundR+0.08,rMax=boundR+0.55;
  var wave=Math.random()*Math.PI*2,sc=1.1+Math.random()*0.35;
  for(var attempt=0;attempt<80;attempt++){
    var ang=Math.random()*Math.PI*2;
    var r=rMin+Math.random()*(rMax-rMin);
    var x=o.x+o.rx*r*Math.cos(ang),y=o.y+o.ry*r*Math.sin(ang);
    x=Math.max(30,Math.min(W-30,x));y=Math.max(30,Math.min(H-30,y));
    if(inOcean(x,y))return{x:x,y:y,wave:wave,sc:sc};
  }
  var ang=Math.random()*Math.PI*2;
  var x=o.x+o.rx*(rMin+0.1)*Math.cos(ang),y=o.y+o.ry*(rMin+0.1)*Math.sin(ang);
  return{x:Math.max(30,Math.min(W-30,x)),y:Math.max(30,Math.min(H-30,y)),wave:wave,sc:sc};
}

// Fixed seaweed layout: 15 positions around island shore, all in ocean.
// Keep a gap at bottom-center (dock area), so no spawn around 270°.
var SW_ANGLES_DEG=[8,30,52,74,96,118,140,162,184,206,228,250,292,314,336];
var SW_RADII    =[1.25,1.23,1.28,1.21,1.27,1.24,1.29,1.22,1.26,1.23,1.28,1.24,1.27,1.22,1.28];
var SW_SCALES   =[1.02,1.18,1.11,1.26,0.98,1.21,1.08,1.30,1.05,1.16,1.24,1.00,1.28,1.09,1.19];
function genFixedSeaweeds(){
  var o=islandCenter(),sw=[];
  for(var i=0;i<15;i++){
    var ang=SW_ANGLES_DEG[i]*Math.PI/180;
    var r=SW_RADII[i];
    // Push initial spots ~5px farther from island edge for cleaner gameplay.
    var x=o.x+o.rx*r*Math.cos(ang)+Math.cos(ang)*5;
    var y=o.y+o.ry*r*Math.sin(ang)+Math.sin(ang)*5;
    x=Math.max(30,Math.min(W-30,x));y=Math.max(30,Math.min(H-30,y));
    // safety: if somehow inside island, nudge outward
    if(!inOcean(x,y)){r=SW_RADII[i]+0.18;x=o.x+o.rx*r*Math.cos(ang)+Math.cos(ang)*5;y=o.y+o.ry*r*Math.sin(ang)+Math.sin(ang)*5;
      x=Math.max(30,Math.min(W-30,x));y=Math.max(30,Math.min(H-30,y));}
    sw.push({x:x,y:y,wave:i*Math.PI/7.5,sc:SW_SCALES[i]});
  }
  return sw;
}

function addSW(n){
  var added=0,tries=0;
  while(added<n&&tries<120){
    tries++;var sw=genSW();var ok=inOcean(sw.x,sw.y);
    if(!ok)continue;
    for(var j=0;j<G.seaweeds.length;j++)if(Math.hypot(G.seaweeds[j].x-sw.x,G.seaweeds[j].y-sw.y)<35){ok=false;break;}
    if(ok){G.seaweeds.push(sw);spawnSeaweedGrow(sw.x,sw.y);added++;}
  }
  G.eco=Math.min(15,G.eco+added);
}

function onGuardPress(pi){
  if(!G)return;
  var p=G.players[pi];
  // Cancel any open menu immediately
  if(p.sellMenu){p.sellMenu=false;ann(PN[pi]+' cancelled','#888');return;}
  if(p.cookMenu){p.cookMenu=false;ann(PN[pi]+' cancelled','#888');return;}
  if(p.buildMenu){p.buildMenu=false;ann(PN[pi]+' cancelled','#888');return;}
  // Ocean + fish → release fish (short-press unchanged)
  if(!inIsland(p.x,p.y)&&p.hand.length>0){doOceanRelease(pi);return;}
  // Ocean no fish → nothing
  if(!inIsland(p.x,p.y))return;
  // Island on cooldown → inform
  if(p.guardCD>0){ann('Guard CD '+Math.ceil(p.guardCD)+'s','#6b86a8');return;}
  // Start tracking hold
  p.guardHeld=true;p.guardHoldT=0;
}
function onGuardRelease(pi){
  if(!G)return;
  var p=G.players[pi];
  if(!p.guardHeld)return;
  if(p.guardHoldT<0.25){
    // Short press on island → open build menu
    if(inIsland(p.x,p.y))openBuildMenu(pi);
  } else {
    // Long press ended → deactivate guard
    if(p.guarding){p.guarding=false;p.guardT=0;p.guardCD=5;ann(PN[pi]+' guard down','#6b86a8');}
  }
  p.guardHeld=false;p.guardHoldT=0;
}
function onKey(k){
  for(var i=0;i<4;i++){
    if(k===CTRL[i].act)doAction(i);
    if(k===CTRL[i].grd)onGuardPress(i);
  }
}

function doAction(pi){
  if(!G)return;
  var p=G.players[pi],px=p.x,py=p.y;
  // Build menu confirm takes highest priority — avoids conflict with fish pickup
  if(p.buildMenu){if(tryZoneBuild())return;}
  // steal enemy pond
  for(var oi=0;oi<4;oi++){
    if(oi===pi)continue;
    for(var j=0;j<G.ponds.length;j++){
      var pd=G.ponds[j];
      if(pd.owner===oi&&Math.hypot(px-pd.x,py-pd.y)<55&&pd.fish.length>0){
        if(p.stealCD>0){sfxNo();ann('⏳ On cooldown...','#c45c5c');return;}
        trySteal(pi,oi,pd);return;
      }
    }
  }
  // pick own pond
  for(var j=0;j<G.ponds.length;j++){
    var pd=G.ponds[j];
    if(pd.owner===pi&&Math.hypot(px-pd.x,py-pd.y)<55&&pd.fish.length>0){
      p.hand.push(pd.fish.pop());sfxPop();ann(PN[pi]+' took a fish 🐟',PC[pi]);return;
    }
  }
  function tryZoneBuild(){
    if(!p.buildMenu)return false;
    if(!inIsland(px,py)){p.buildMenu=false;return false;}
    var myP=G.ponds.filter(function(d){return d.owner===pi;});
    var salPond=null,tunPond=null;
    for(var qi=0;qi<myP.length;qi++){if(myP[qi].fishType==='salmon')salPond=myP[qi];else tunPond=myP[qi];}
    var opt0=salPond?(salPond.level<3?{action:'upgrade',fishType:'salmon'}:{action:'none',fishType:'salmon'}):{action:'create',fishType:'salmon'};
    var opt1=tunPond?(tunPond.level<3?{action:'upgrade',fishType:'tuna'}:{action:'none',fishType:'tuna'}):{action:'create',fishType:'tuna'};
    var sel=p.buildMenuSel===0?opt0:opt1;
    if(sel.action==='none'){sfxNo();ann(sel.fishType==='salmon'?'Salmon pond is max level!':'Tuna pond is max level!','#c45c5c');return true;}
    p.buildMenu=false;p.seaweed-=3;
    if(sel.action==='create'){
      // Check pond collision
      for(var ci=0;ci<G.ponds.length;ci++){if(Math.hypot(px-G.ponds[ci].x,py-G.ponds[ci].y)<52){sfxNo();ann('Too close to another pond!','#888');p.seaweed+=3;return true;}}
      G.ponds.push({id:G.nextId++,owner:pi,level:1,fish:[],timer:0,x:px,y:py,fishType:sel.fishType});
      sfxBuild();spawnBuild(px,py);ann(PN[pi]+' created '+sel.fishType+' pond! \uD83C\uDF89',PC[pi]);
    } else {
      var tgt=sel.fishType==='salmon'?salPond:tunPond;
      if(tgt){tgt.level++;sfxBuild();spawnBuild(px,py);ann(PN[pi]+' '+sel.fishType+' pond Lv.'+tgt.level+'! \uD83C\uDF89',PC[pi]);}
    }
    return true;
  }
  // market
  if(inMarket(px,py)){
    if(p.sellMenu){
      var sopt=p.sellMenuOpts[p.sellMenuSel];p.sellMenu=false;
      if(sopt.source==='cooked'){
        var cidx=-1;for(var k=p.cooked.length-1;k>=0;k--)if(p.cooked[k].fishType===sopt.fishType){cidx=k;break;}
        if(cidx>=0){var f=p.cooked.splice(cidx,1)[0];var cp=getFishCookPrice(f);p.money+=cp;sfxCoin();spawnCoin(px,py);ann(PN[pi]+' sold cooked '+f.name+' +$'+cp,PC[pi]);}
      }else{
        var fidx=-1;for(var k=p.hand.length-1;k>=0;k--)if(p.hand[k].fishType===sopt.fishType){fidx=k;break;}
        if(fidx>=0){var f=p.hand.splice(fidx,1)[0];var sp=getFishSellPrice(f);p.money+=sp;sfxCoin();spawnCoin(px,py);ann(PN[pi]+' sold '+f.name+' +$'+sp,PC[pi]);}
      }
      return;
    }
    var sopts=[];
    var rawSeen={};
    for(var k=p.hand.length-1;k>=0;k--){var rft=p.hand[k].fishType||'salmon';if(!rawSeen[rft]){rawSeen[rft]=true;sopts.push({source:'raw',fishType:rft,label:'Raw '+rft,price:getFishSellPrice(p.hand[k])});}}
    var cookedSeen={};
    for(var k=p.cooked.length-1;k>=0;k--){var cft=p.cooked[k].fishType||'salmon';if(!cookedSeen[cft]){cookedSeen[cft]=true;sopts.push({source:'cooked',fishType:cft,label:'Cooked '+cft,price:getFishCookPrice(p.cooked[k])});}}
    if(sopts.length===0){sfxNo();ann('No fish to sell','#888');return;}
    if(sopts.length===1){
      var sopt=sopts[0];
      if(sopt.source==='cooked'){var cidx=-1;for(var k=p.cooked.length-1;k>=0;k--)if(p.cooked[k].fishType===sopt.fishType){cidx=k;break;}if(cidx>=0){var f=p.cooked.splice(cidx,1)[0];var cp=sopt.price;p.money+=cp;sfxCoin();spawnCoin(px,py);ann(PN[pi]+' sold cooked '+f.name+' +$'+cp,PC[pi]);}}
      else{var fidx=-1;for(var k=p.hand.length-1;k>=0;k--)if(p.hand[k].fishType===sopt.fishType){fidx=k;break;}if(fidx>=0){var f=p.hand.splice(fidx,1)[0];var sp=sopt.price;p.money+=sp;sfxCoin();spawnCoin(px,py);ann(PN[pi]+' sold '+f.name+' +$'+sp,PC[pi]);}}
      return;
    }
    p.sellMenu=true;p.sellMenuSel=0;p.sellMenuOpts=sopts;p.menuDxPrev=0;
    ann(PN[pi]+': \u25c4\u25ba choose  \u2022  A sell  \u2022  B cancel','#2a8a40');return;
  }
  // kitchen
  if(inKitchen(px,py)){
    if(p.cookMenu){
      var copt=p.cookMenuOpts[p.cookMenuSel];p.cookMenu=false;
      var fidx=-1;for(var k=p.hand.length-1;k>=0;k--)if(p.hand[k].fishType===copt.fishType){fidx=k;break;}
      if(fidx>=0){var f=p.hand.splice(fidx,1)[0];p.cooking=f;p.cookT=f.cookT;sfxCook();ann(PN[pi]+' cooking '+f.name,'#d4a050');}
      return;
    }
    if(p.cooking){ann('Cooking\u2026 '+Math.ceil(p.cookT)+'s','#d4a050');return;}
    if(p.hand.length===0){sfxNo();ann('No fish in hand','#888');return;}
    var ctypes={};var copts=[];
    for(var k=0;k<p.hand.length;k++){var cft=p.hand[k].fishType||'salmon';if(!ctypes[cft]){ctypes[cft]=true;copts.push({fishType:cft,label:'Cook '+cft.charAt(0).toUpperCase()+cft.slice(1)});}}
    if(copts.length===1){
      var fidx=-1;for(var k=p.hand.length-1;k>=0;k--)if(p.hand[k].fishType===copts[0].fishType){fidx=k;break;}
      if(fidx>=0){var f=p.hand.splice(fidx,1)[0];p.cooking=f;p.cookT=f.cookT;sfxCook();ann(PN[pi]+' cooking '+f.name,'#d4a050');}
      return;
    }
    p.cookMenu=true;p.cookMenuSel=0;p.cookMenuOpts=copts;p.menuDxPrev=0;
    ann(PN[pi]+': \u25c4\u25ba choose  \u2022  A cook  \u2022  B cancel','#d4a050');return;
  }
  // zone: build/upgrade pond
  if(tryZoneBuild())return;
  // ocean — Action = gather only; Guard = release (see onGuard)
  if(!inIsland(px,py)){
    var best=null,bestD=60;
    for(var j=0;j<G.seaweeds.length;j++){var d=Math.hypot(px-G.seaweeds[j].x,py-G.seaweeds[j].y);if(d<bestD){bestD=d;best=j;}}
    if(best!==null){
      var sw=G.seaweeds[best];
      if(p.gathering&&Math.hypot(p.gathering.tx-sw.x,p.gathering.ty-sw.y)<8){ann('Gathering…','#5a8a6a');return;}
      p.gathering={tx:sw.x,ty:sw.y,t:0,maxT:GATHER_TIME};
      sfxPop();ann(PN[pi]+' gathering seaweed…','#5a8a6a');return;
    }
    sfxNo();ann('No seaweed nearby','#888');
  }
}

function trySteal(pi,oi,pd){
  var op=G.players[oi];
  if(op.guarding){sfxNo();ann('🛡 '+PN[oi]+' blocked '+PN[pi],'#c45c5c');G.players[pi].stealCD=5;return;}
  var f=pd.fish[pd.fish.length-1];
  if(f.type==='ssr'){startMG(pi,oi,pd);return;}
  pd.fish.pop();G.players[pi].hand.push(f);G.players[pi].steals++;G.players[pi].morality--;G.players[pi].stealCD=10;
  sfxSteal();ann('🏴 '+PN[pi]+' stole '+f.name+' from '+PN[oi],'#b85850');
  if(!police&&Math.random()<0.5)spawnPolice(pi,f,pd);
}

function spawnPolice(targetPi,stolenFish,sourcePond){
  var ic=IC();
  police={x:ic.x,y:ic.y+ic.ry*0.6,targetPi:targetPi,timer:10,stolenFish:stolenFish||null,sourcePondId:sourcePond?sourcePond.id:null};
  sfxPoliceWail();
  ann('🚔 Police! '+PN[targetPi]+' is being chased!','#d02020');
}

function startMG(pi,oi,pd){
  running=false;mg={pis:[pi,oi],pd:pd,scores:[0,0],timer:3,iv:null};
  var pads0=getPads();
  gpPrevAct[pi]=pads0[pi]&&gpBtnDown(pads0[pi],GP_BTN_ACT);
  gpPrevAct[oi]=pads0[oi]&&gpBtnDown(pads0[oi],GP_BTN_ACT);
  document.getElementById('mgd').textContent=PN[pi]+' VS '+PN[oi]+' — mash A (Action)!';
  var bars=document.getElementById('mgb');bars.innerHTML='';
  for(var k=0;k<2;k++){(function(k){
    var w=document.createElement('div');w.className='mgbw';
    var bg=document.createElement('div');bg.className='mgbg';
    var fill=document.createElement('div');fill.className='mgbf';fill.id='mgf'+k;fill.style.height='4px';fill.style.background=PC[mg.pis[k]];
    bg.appendChild(fill);var lbl=document.createElement('div');lbl.className='mgbl';lbl.style.color=PC[mg.pis[k]];lbl.textContent=PN[mg.pis[k]];
    w.appendChild(bg);w.appendChild(lbl);bars.appendChild(w);
  })(k);}
  document.getElementById('mgcnt').textContent='3';
  document.getElementById('mgs').style.display='flex';
  mg.iv=setInterval(function(){mg.timer--;document.getElementById('mgcnt').textContent=mg.timer;if(mg.timer<=0){clearInterval(mg.iv);endMG();}},1000);
}

function onMgKey(k){
  if(!mg)return;
  for(var j=0;j<2;j++){if(k===CTRL[mg.pis[j]].act){mg.scores[j]++;var b=document.getElementById('mgf'+j);if(b)b.style.height=Math.min(72,mg.scores[j]*5)+'px';}}
}

function endMG(){
  document.getElementById('mgs').style.display='none';
  var wi=mg.scores[0]>=mg.scores[1]?mg.pis[0]:mg.pis[1];
  var savedPd=mg.pd;
  var f=mg.pd.fish.pop();if(f){G.players[wi].hand.push(f);G.players[wi].steals++;G.players[wi].morality--;}
  G.players[wi].stealCD=10;sfxWin();ann('🌟 '+PN[wi]+' won the SSR clash!','#ffd700');mg=null;running=true;
  if(G&&!police&&Math.random()<0.5)spawnPolice(wi,f,savedPd);
}

function ann(txt,col){
  var el=document.getElementById('annbox');el.textContent=txt;el.style.color=col||'#333';el.style.display='block';annT=2.5;
}

function update(dt){
  var pads=getPads();
  for(var gpi=0;gpi<4;gpi++){
    var gp=pads[gpi];
    var act=gp&&gpBtnDown(gp,GP_BTN_ACT);
    var grd=gp&&gpBtnDown(gp,GP_BTN_GRD);
    if(mg){
      if((gpi===mg.pis[0]||gpi===mg.pis[1])&&act&&!gpPrevAct[gpi]){
        var mj=gpi===mg.pis[0]?0:1;
        mg.scores[mj]++;
        var bel=document.getElementById('mgf'+mj);
        if(bel)bel.style.height=Math.min(72,mg.scores[mj]*5)+'px';
      }
    }else if(running&&G){
      if(act&&!gpPrevAct[gpi])doAction(gpi);
      if(grd&&!gpPrevGrd[gpi])onGuardPress(gpi);
      if(!grd&&gpPrevGrd[gpi])onGuardRelease(gpi);
    }
    gpPrevAct[gpi]=!!act;
    gpPrevGrd[gpi]=!!grd;
  }
  if(mg)return;
  if(!running||!G)return;
  gameTime-=dt;if(gameTime<=0){gameTime=0;endGame();return;}
  priceTimer+=dt;
  if(priceTimer>=30){
    priceTimer-=30;
    fishPrices={salmon:nextPrices.salmon,tuna:nextPrices.tuna};
    priceHistory.salmon.push(fishPrices.salmon);if(priceHistory.salmon.length>7)priceHistory.salmon.shift();
    priceHistory.tuna.push(fishPrices.tuna);if(priceHistory.tuna.length>7)priceHistory.tuna.shift();
    nextPrices={salmon:nextFishPrice(fishPrices.salmon),tuna:nextFishPrice(fishPrices.tuna)};
    ann('📊 Market update!  Salmon $'+fishPrices.salmon+'  •  Tuna $'+fishPrices.tuna,'#c8860a');
  }
  var emu=G.eco<5?0.4:1;
  for(var j=0;j<G.ponds.length;j++){
    var pd=G.ponds[j];if(pd.fish.length>=PCAP[pd.level])continue;
    pd.timer+=dt*emu;
    if(pd.timer>=PRATE[pd.level]){pd.timer=0;var f=pickFishForPond(pd.fishType||'salmon');pd.fish.push(f);if(f.fishType==='ssr'){sfxSSR();ann('⚠ SSR in '+PN[pd.owner]+"'s pond!",'#ffd700');}}
  }
  for(var i=0;i<4;i++){
    var p=G.players[i],ct=CTRL[i];var dx=0,dy=0;
    if(keys[ct.l])dx-=1;if(keys[ct.r])dx+=1;if(keys[ct.u])dy-=1;if(keys[ct.d])dy+=1;
    if(dx&&dy){dx*=0.707;dy*=0.707;}
    var gpi2=pads[i];
    if(gpi2){
      var dp=gpDpad(gpi2);
      if(dp.x||dp.y){
        var ddx=dp.x,ddy=dp.y;
        if(ddx&&ddy){ddx*=0.707;ddy*=0.707;}
        dx+=ddx;dy+=ddy;
      }else{
        var st=gpStick(gpi2);
        dx+=st.x;dy+=st.y;
      }
      var nlen=Math.hypot(dx,dy);
      if(nlen>1){dx/=nlen;dy/=nlen;}
    }
    var spd=118*dt;p.x=Math.max(15,Math.min(W-15,p.x+dx*spd));p.y=Math.max(15,Math.min(H-15,p.y+dy*spd));
    p.moving=(dx!==0||dy!==0);if(p.moving){p.vx=dx;p.vy=dy;}
    // Dust particles while moving
    if(p.moving){
      p.dustT-=dt;
      if(p.dustT<=0){
        p.dustT=0.07;
        var isH=Math.abs(dx)>=Math.abs(dy);
        var dSide=isH?(dx>0?-1:1):(dy>0?-1:1);
        for(var _k=0;_k<3;_k++){
          var _sp=(Math.random()-0.5)*10;
          particles.push({tp:'dust',
            x:p.x+(isH?dSide*(16+Math.random()*8):_sp*1.5),
            y:p.y+18+Math.random()*5,
            vx:dSide*(10+Math.random()*14)+_sp*0.4,
            vy:-(4+Math.random()*8),
            life:1,maxLife:0.25+Math.random()*0.15,
            r:2.4+Math.random()*2.6,dr:6+Math.random()*5,
            grav:18,col:_DUSTCOLS[Math.floor(Math.random()*_DUSTCOLS.length)]});
        }
      }
    }else{p.dustT=0;}
    if(p.gathering&&inIsland(p.x,p.y))p.gathering=null;
    if(p.stealCD>0)p.stealCD-=dt;
    if(p.guardCD>0)p.guardCD-=dt;
    if(p.buildMenu){
      var bDx=0;
      if(keys[CTRL[i].l])bDx=-1;if(keys[CTRL[i].r])bDx=1;
      var bPad=pads[i];if(bPad){var bSt=gpStick(bPad),bDp=gpDpad(bPad);
        bDx=bDx||(bDp.x?bDp.x:(bSt.x>0.5?1:bSt.x<-0.5?-1:0));}
      if(bDx<0)p.buildMenuSel=0;if(bDx>0)p.buildMenuSel=1;
    }
    if(p.sellMenu||p.cookMenu){
      var mDx=0;
      if(keys[CTRL[i].l])mDx=-1;if(keys[CTRL[i].r])mDx=1;
      var mPad=pads[i];if(mPad){var mSt=gpStick(mPad),mDp=gpDpad(mPad);
        mDx=mDx||(mDp.x?mDp.x:(mSt.x>0.5?1:mSt.x<-0.5?-1:0));}
      if(mDx!==0&&p.menuDxPrev===0){
        if(p.sellMenu&&p.sellMenuOpts.length>0){var n=p.sellMenuOpts.length;p.sellMenuSel=(p.sellMenuSel+mDx+n)%n;}
        if(p.cookMenu&&p.cookMenuOpts.length>0){var n=p.cookMenuOpts.length;p.cookMenuSel=(p.cookMenuSel+mDx+n)%n;}
      }
      p.menuDxPrev=mDx;
    } else {p.menuDxPrev=0;}
    if(p.guardHeld){
      p.guardHoldT+=dt;
      // Activate guard once hold passes 250ms threshold
      if(!p.guarding&&p.guardHoldT>=0.25&&inIsland(p.x,p.y)){
        p.guarding=true;p.guardT=5;
        ann(PN[i]+' guard up (hold B)','rgba(80,150,220,0.95)');
      }
    }
    if(p.guarding){
      p.guardT-=dt;
      if(p.guardT<=0){
        p.guarding=false;p.guardT=0;p.guardCD=5;p.guardHeld=false;
        ann(PN[i]+' guard expired','#6b86a8');
      }
    }
    if(p.cooking&&p.cookT>0){p.cookT-=dt;if(p.cookT<=0){p.cooked.push(p.cooking);p.cooking=null;sfxCook();ann(PN[i]+' \u2705 fish cooked! Sell at Market',PC[i]);}}
    if(p.gathering){
      var gi=-1,gd=999;
      for(var gj=0;gj<G.seaweeds.length;gj++){
        var d0=Math.hypot(G.seaweeds[gj].x-p.gathering.tx,G.seaweeds[gj].y-p.gathering.ty);
        if(d0<gd&&d0<22){gd=d0;gi=gj;}
      }
      if(gi<0||Math.hypot(p.x-G.seaweeds[gi].x,p.y-G.seaweeds[gi].y)>58){p.gathering=null;continue;}
      p.gathering.t+=dt;
      if(p.gathering.t>=p.gathering.maxT){
        // gi is already confirmed valid; splice directly to avoid 18px vs 22px mismatch bug
        var _sw=G.seaweeds[gi];spawnCollect(_sw.x,_sw.y);
        G.seaweeds.splice(gi,1);G.eco=Math.max(0,G.eco-1);p.seaweed++;p.gathering=null;
        sfxGather();ann(PN[i]+' gathered seaweed · '+p.seaweed+' 🌿',PC[i]);
      }
    }
  }
  // Police NPC update
  if(police){
    police.timer-=dt;
    if(police.timer<=0){police=null;}
    else{
      var tp=G.players[police.targetPi];
      var pdx=tp.x-police.x,pdy=tp.y-police.y,pdist=Math.hypot(pdx,pdy);
      if(pdist>1){var pspd=118*dt;police.x+=pdx/pdist*pspd;police.y+=pdy/pdist*pspd;}
      if(pdist<32){
        tp.money-=10;
        // Return stolen fish to source pond
        if(police.stolenFish){
          var fi=tp.hand.indexOf(police.stolenFish);
          if(fi>=0){
            tp.hand.splice(fi,1);
            for(var pi2=0;pi2<G.ponds.length;pi2++){
              if(G.ponds[pi2].id===police.sourcePondId){
                var cap=PCAP[G.ponds[pi2].level];
                if(G.ponds[pi2].fish.length<cap)G.ponds[pi2].fish.push(police.stolenFish);
                break;
              }
            }
          }
        }
        sfxNo();ann('🚔 '+PN[police.targetPi]+' caught! -$10, fish confiscated!','#d02020');police=null;
      }
    }
  }
  for(var mi=0;mi<4;mi++){
    var mm=G.players[mi].money;
    if(mm>prevMoney[mi])moneyFlash[mi]=0.55;
    prevMoney[mi]=mm;
    if(moneyFlash[mi]>0)moneyFlash[mi]-=dt*1.8;
  }
  for(var j=0;j<G.seaweeds.length;j++)G.seaweeds[j].wave+=dt*1.05;
  updateParticles(dt);
  annT-=dt;if(annT<=0)document.getElementById('annbox').style.display='none';
}

// ─── DRAW HELPERS ───
function rr(x,y,w,h,r){
  C.beginPath();C.moveTo(x+r,y);C.lineTo(x+w-r,y);C.arcTo(x+w,y,x+w,y+r,r);
  C.lineTo(x+w,y+h-r);C.arcTo(x+w,y+h,x+w-r,y+h,r);
  C.lineTo(x+r,y+h);C.arcTo(x,y+h,x,y+h-r,r);
  C.lineTo(x,y+r);C.arcTo(x,y,x+r,y,r);C.closePath();
}

function drawBackground(){

    C.translate(sw.x,sw.y);

  C.beginPath();C.moveTo(s2*0.45,-8);C.quadraticCurveTo(13+s2,-15,17+s2,-10);C.stroke();
  C.strokeStyle='#1e8449';C.lineWidth=2.2;
  C.beginPath();C.moveTo(s2*0.35,-14);C.quadraticCurveTo(-10+s2,-20,-13+s2,-17);C.stroke();

function drawPond(pd){
  var lv=Math.min(Math.max(pd.level,1),3);
  var sc=0.84+(lv-1)*0.14;
  var hasSsr=false;
  for(var k=0;k<pd.fish.length;k++)if(pd.fish[k].fishType==='ssr'){hasSsr=true;break;}
  var st=[
    {rim:'#48c878',tag:'#0d5038',sub:'#3d6a55'},
    {rim:'#30c0e8',tag:'#064060',sub:'#2a7090'},
    {rim:'#f8d060',tag:'#082060',sub:'#203878'}
  ][lv-1];
  var img=imgPond[lv-1];
  var pondH=62*sc;
  var pondW=img&&img.complete&&img.naturalWidth>0?pondH*img.naturalWidth/img.naturalHeight:100*sc;
  if(hasSsr){
    C.save();C.globalAlpha=0.28+Math.sin(_t*5)*0.18;
    C.fillStyle='#ffd700';C.beginPath();C.ellipse(pd.x,pd.y,pondW*0.55,pondH*0.42,0,0,Math.PI*2);C.fill();
    C.restore();
  }
  C.fillStyle='rgba(0,0,0,0.14)';C.beginPath();C.ellipse(pd.x,pd.y+pondH*0.32,pondW*0.42,11*sc,0,0,Math.PI*2);C.fill();
  if(img&&img.complete&&img.naturalWidth>0){
    C.drawImage(img,pd.x-pondW/2,pd.y-pondH/2,pondW,pondH);
  }else{
    var rxw=31*sc,ryw=22*sc;
    var wg=C.createRadialGradient(pd.x-9*sc,pd.y-8*sc,1.5*sc,pd.x,pd.y,34*sc);
    wg.addColorStop(0,'#d4f5e8');wg.addColorStop(0.55,'#48c0e0');wg.addColorStop(1,'#187890');
    C.fillStyle=wg;C.beginPath();C.ellipse(pd.x,pd.y,rxw,ryw,0,0,Math.PI*2);C.fill();
  }
  var fr=0.92+(lv-1)*0.04;
  for(var fk=0;fk<pd.fish.length;fk++){
    var f=pd.fish[fk],fa=(fk/Math.max(1,pd.fish.length))*Math.PI*2+_t*0.85;
    var rad=f.rad*fr*sc;
    var fx=pd.x+Math.cos(fa)*13*sc,fy=pd.y+Math.sin(fa)*7.5*sc;
    C.fillStyle=f.col;C.beginPath();C.ellipse(fx,fy,rad,rad*0.62,fa,0,Math.PI*2);C.fill();
    C.beginPath();C.moveTo(fx-Math.cos(fa)*rad,fy-Math.sin(fa)*rad*0.62);
    C.lineTo(fx-Math.cos(fa)*rad-Math.cos(fa-0.9)*4.5*sc,fy-Math.sin(fa)*rad*0.62-Math.sin(fa-0.9)*4.5*sc);
    C.lineTo(fx-Math.cos(fa)*rad-Math.cos(fa+0.9)*4.5*sc,fy-Math.sin(fa)*rad*0.62-Math.sin(fa+0.9)*4.5*sc);
    C.closePath();C.fill();
    C.fillStyle='rgba(255,255,255,0.55)';C.beginPath();C.arc(fx+Math.cos(fa),fy+Math.sin(fa)*0.6,1.3*sc,0,Math.PI*2);C.fill();
  }
  // Panel above pond: fish icon + Lv (no player label — see flag below)
  var lblIcon=pd.fishType==='tuna'?imgTuna:imgSalmon;
  var iconSz=14;
  C.font='800 11px "Segoe UI",system-ui,sans-serif';
  var lvW=C.measureText('Lv'+lv).width;
  var hasIcon=lblIcon.complete&&lblIcon.naturalWidth>0;
  var totalW=(hasIcon?iconSz+3:0)+lvW;
  var tagW=Math.max(52,totalW+16),tagH=22,tagTop=pd.y-pondH/2-tagH-4;
  C.fillStyle='rgba(255,255,255,0.97)';rr(pd.x-tagW/2,tagTop,tagW,tagH,8);C.fill();
  C.strokeStyle=st.rim;C.lineWidth=lv>=2?2.5:1.8;rr(pd.x-tagW/2,tagTop,tagW,tagH,8);C.stroke();
  var tx=pd.x-totalW/2,ty=tagTop+15;
  if(hasIcon){C.drawImage(lblIcon,tx,ty-iconSz+2,iconSz,iconSz);tx+=iconSz+3;}
  C.fillStyle=st.tag;C.textAlign='left';C.fillText('Lv'+lv,tx,ty);
  C.textAlign='left';
  // Flag: pole + triangular pennant with player color + player PNG
  var flagX=pd.x+pondW/2+10,poleBot=pd.y+pondH*0.2,poleTop2=pd.y-pondH/2-2;
  C.strokeStyle='rgba(80,55,30,0.85)';C.lineWidth=2;
  C.beginPath();C.moveTo(flagX,poleBot);C.lineTo(flagX,poleTop2);C.stroke();
  // Triangle pennant (points right from pole top) — rounded corners
  var fW=32,fH=26,fR=3;
  var p0x=flagX,p0y=poleTop2;
  var p1x=flagX+fW,p1y=poleTop2+fH/2;
  var p2x=flagX,p2y=poleTop2+fH;
  C.beginPath();
  C.moveTo((p0x+p1x)/2,(p0y+p1y)/2);
  C.arcTo(p1x,p1y,p2x,p2y,fR);
  C.arcTo(p2x,p2y,p0x,p0y,fR);
  C.arcTo(p0x,p0y,p1x,p1y,fR);
  C.closePath();
  C.fillStyle='rgba(255,255,255,0.97)';C.fill();
  C.strokeStyle=PC[pd.owner];C.lineWidth=1.8;C.stroke();
  // Player PNG centered at triangle centroid
  var avSz=16,avImg=imgP[pd.owner];
  var avX=flagX+fW/3-avSz/2,avY=poleTop2+fH/2-avSz/2;
  if(avImg&&avImg.complete&&avImg.naturalWidth>0){
    C.drawImage(avImg,avX,avY,avSz,avSz);
  }else{
    C.fillStyle=PC[pd.owner];C.font='700 9px sans-serif';C.textAlign='center';
    C.fillText(PN[pd.owner],flagX+fW*0.38,poleTop2+fH/2+3);C.textAlign='left';
  }
}

function drawPoliceSiren(cx,cy){
  // Pill/capsule: left half RED, right half BLUE, alternating flash
  var w=36,h=13,hr=h/2;
  var phase=Math.sin(_t*10)>0; // ~1.6 Hz flash
  // Background capsule
  C.fillStyle='rgba(12,12,22,0.82)';
  rr(cx-w/2,cy-hr,w,h,hr);C.fill();
  C.save();
  // Left half (red)
  C.beginPath();C.rect(cx-w/2,cy-hr,w/2,h);C.clip();
  C.fillStyle='rgba(255,30,30,'+(phase?'1':'0.12')+')';
  if(phase){C.shadowColor='#ff1a1a';C.shadowBlur=12;}
  rr(cx-w/2,cy-hr,w,h,hr);C.fill();
  C.restore();
  C.save();
  // Right half (blue)
  C.beginPath();C.rect(cx,cy-hr,w/2,h);C.clip();
  C.fillStyle='rgba(30,50,255,'+(phase?'0.12':'1')+')';
  if(!phase){C.shadowColor='#1a2aff';C.shadowBlur=12;}
  rr(cx-w/2,cy-hr,w,h,hr);C.fill();
  C.restore();
  // Outline
  C.strokeStyle='rgba(255,255,255,0.8)';C.lineWidth=1;
  rr(cx-w/2,cy-hr,w,h,hr);C.stroke();
}

function drawProgBar(cx,cy,w,h,prog,colA,colB){
  prog=Math.max(0,Math.min(1,prog));
  C.fillStyle='rgba(40,55,65,0.28)';rr(cx-w/2,cy-h/2,w,h,6);C.fill();
  C.strokeStyle='rgba(255,255,255,0.5)';C.lineWidth=1;rr(cx-w/2,cy-h/2,w,h,6);C.stroke();
  if(prog<0.02)return;
  var fw=Math.max(4,w*prog);
  var g=C.createLinearGradient(cx-w/2,cy,cx-w/2+fw,cy);
  g.addColorStop(0,colA);g.addColorStop(1,colB);
  C.fillStyle=g;rr(cx-w/2,cy-h/2,fw,h,5);C.fill();
}

// ── Fish price sparkline helpers ─────────────────────────────────────────────
function drawPriceSparkline(x,y,w,h,hist,fishType,nxtPrice){
  var isSal=fishType==='salmon';
  var lineCol=isSal?'#d85a20':'#1e5fc0';
  var gridCol=isSal?'rgba(200,100,60,0.2)':'rgba(40,90,200,0.2)';
  var axisCol='rgba(55,70,90,0.45)';
  var minV=3,maxV=5;
  var padT=7,padB=8,labelW=19;
  var plotX=x+labelW,plotY=y+padT,plotW=w-labelW-4,plotH=h-padT-padB;
  var visibleHist=hist.slice(-2);
  var n=visibleHist.length;
  function priceY(val){
    return plotY+plotH-(val-minV)/(maxV-minV)*plotH;
  }
  function clampY(py){
    return Math.max(plotY+2,Math.min(plotY+plotH-2,py));
  }
  function drawStepLine(pts,dashed,col,width){
    if(pts.length<2)return;
    C.save();
    if(dashed)C.setLineDash([5,5]);
    C.strokeStyle=col;C.lineWidth=width;C.lineJoin='round';C.lineCap='round';
    C.beginPath();C.moveTo(pts[0].x,pts[0].y);
    for(var i=1;i<pts.length;i++){
      var midX=pts[i].x;
      C.lineTo(midX,pts[i-1].y);
      C.lineTo(midX,pts[i].y);
    }
    C.stroke();C.restore();
  }
  function pathLength(pts){
    var len=0;
    for(var i=1;i<pts.length;i++)len+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
    return len;
  }
  function pointAtDistance(pts,dist){
    if(pts.length===0)return{x:0,y:0};
    for(var i=1;i<pts.length;i++){
      var a=pts[i-1],b=pts[i],seg=Math.hypot(b.x-a.x,b.y-a.y);
      if(seg<=0)continue;
      if(dist<=seg){
        var t=dist/seg;
        return{x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t};
      }
      dist-=seg;
    }
    return pts[pts.length-1];
  }
  function drawPathRange(pts,fromD,toD,dashed,col,width){
    var total=pathLength(pts);
    fromD=Math.max(0,Math.min(total,fromD));
    toD=Math.max(0,Math.min(total,toD));
    if(toD<=fromD+0.01)return;
    var out=[pointAtDistance(pts,fromD)];
    var walked=0;
    for(var i=1;i<pts.length;i++){
      var a=pts[i-1],b=pts[i],seg=Math.hypot(b.x-a.x,b.y-a.y);
      if(seg<=0)continue;
      var nextWalked=walked+seg;
      if(nextWalked>fromD&&nextWalked<toD)out.push({x:b.x,y:b.y});
      walked=nextWalked;
    }
    out.push(pointAtDistance(pts,toD));
    C.save();
    if(dashed)C.setLineDash([5,5]);
    C.strokeStyle=col;C.lineWidth=width;C.lineCap='round';C.lineJoin='round';
    C.beginPath();C.moveTo(out[0].x,out[0].y);
    for(var j=1;j<out.length;j++)C.lineTo(out[j].x,out[j].y);
    C.stroke();C.restore();
  }
  function drawPointLabel(px,py,val,color,isRightEdge){
    var label='$'+val;
    var textW=label.length*6;
    var labelX=isRightEdge?(px-textW-6):(px+7);
    var labelY=py+(val>=4.7?-6:12);
    labelX=Math.max(plotX+2,Math.min(x+w-textW-3,labelX));
    labelY=Math.max(y+12,Math.min(y+h-3,labelY));
    C.fillStyle=color;
    C.font='900 9px "Segoe UI",sans-serif';
    C.textAlign='left';
    C.fillText(label,labelX,labelY);
  }
  // Sparkline area bg
  C.fillStyle=isSal?'rgba(255,240,232,0.55)':'rgba(232,240,255,0.55)';
  rr(x,y,w,h,7);C.fill();
  C.strokeStyle=isSal?'rgba(210,110,65,0.16)':'rgba(50,100,200,0.16)';
  C.lineWidth=1;rr(x+0.5,y+0.5,w-1,h-1,7);C.stroke();
  // Clip everything to chart area to prevent overflow
  C.save();
  C.beginPath();C.rect(x,y,w,h);C.clip();
  // Fixed $3/$4/$5 axis, matching the hand-drawn reference.
  C.setLineDash([2,3]);C.lineWidth=0.8;
  for(var gv=3;gv<=5;gv++){
    var gy=priceY(gv);
    C.strokeStyle=gridCol;
    C.beginPath();C.moveTo(plotX,gy);C.lineTo(x+w-4,gy);C.stroke();
    C.fillStyle='rgba(50,65,85,0.62)';C.font='800 8px "Segoe UI",sans-serif';
    C.textAlign='left';C.fillText('$'+gv,x+3,gy+3);
  }
  C.setLineDash([]);
  C.strokeStyle=axisCol;C.lineWidth=1;
  C.beginPath();C.moveTo(plotX,plotY-1);C.lineTo(plotX,plotY+plotH+1);C.stroke();
  if(n>=1){
    // The step path scrolls left beneath a fixed "now" dot.
    var dashCol=isSal?'rgba(190,80,30,0.62)':'rgba(25,70,190,0.62)';
    var progress=Math.max(0,Math.min(1,priceTimer/30));
    var slotW=plotW*0.32;
    var dotX=plotX+plotW*0.57;
    var scroll=slotW*progress;
    var histVals=hist.slice(-6);
    if(histVals.length===1&&priceTimer<0.12)histVals=[histVals[0],histVals[0]];
    var currentStartX=dotX-scroll;
    var solidPts=[];
    for(var hi=0;hi<histVals.length;hi++){
      solidPts.push({
        x:currentStartX-(histVals.length-1-hi)*slotW,
        y:clampY(priceY(histVals[hi]))
      });
    }
    var curY=solidPts[solidPts.length-1].y;
    var nxtY=clampY(priceY(nxtPrice));
    solidPts.push({x:dotX,y:curY});
    var futureStepX=dotX+slotW*(1-progress);
    var rightX=dotX+slotW;
    C.save();
    C.beginPath();C.rect(plotX,plotY-2,x+w-plotX-4,plotH+4);C.clip();
    drawStepLine(solidPts,false,lineCol,3.2);
    drawStepLine([{x:dotX,y:curY},{x:futureStepX,y:nxtY},{x:rightX,y:nxtY}],true,dashCol,2.6);
    C.fillStyle=lineCol;C.beginPath();C.arc(dotX,curY,5.2,0,Math.PI*2);C.fill();
    C.strokeStyle='rgba(255,255,255,0.92)';C.lineWidth=1.8;C.stroke();
    C.restore();
  }
  C.restore(); // end clip
  C.textAlign='left';
}

function drawFishPriceCard(cx,cy,cw,ch,fishType){
  var isSal=fishType==='salmon';
  var price=fishPrices[fishType];
  var nxt=nextPrices[fishType];
  var hist=priceHistory[fishType];
  var isHigh=price>=5;
  var pulse=0.55+0.35*Math.abs(Math.sin(_t*5));
  var accentCol=isSal?'#c04818':'#1448b0';
  // Background
  C.fillStyle=isSal?'rgba(255,248,243,0.97)':'rgba(243,247,255,0.97)';
  rr(cx,cy,cw,ch,15);C.fill();
  if(isHigh){
    C.save();C.globalAlpha=0.07+0.07*pulse;
    C.fillStyle=isSal?'#ff5010':'#1040ff';
    rr(cx,cy,cw,ch,15);C.fill();C.restore();
  }
  var bAlpha=isHigh?(0.42+0.28*pulse):0.38;
  C.strokeStyle=isSal?'rgba(210,90,40,'+bAlpha.toFixed(2)+')':'rgba(30,90,210,'+bAlpha.toFixed(2)+')';
  C.lineWidth=isHigh?2:1.5;rr(cx,cy,cw,ch,15);C.stroke();
  // Fish icon
  var img=isSal?imgSalmon:imgTuna;var iSz=22;
  if(img.complete&&img.naturalWidth>0)C.drawImage(img,cx+7,cy+8,iSz,iSz);
  // Fish name label
  C.fillStyle=accentCol;C.font='700 8px "Segoe UI",sans-serif';C.textAlign='left';
  C.fillText(isSal?'SALMON':'TUNA',cx+33,cy+14);
  // Current price (large)
  var priceStr='$'+price;
  C.font='900 19px "Segoe UI",Arial,sans-serif';
  C.fillStyle=isHigh?(isSal?'rgba(200,60,10,'+pulse.toFixed(2)+')':'rgba(10,50,200,'+pulse.toFixed(2)+')'):(accentCol);
  C.textAlign='left';C.fillText(priceStr,cx+33,cy+38);
  // Next price indicator (below current price)
  var nxtDiff=nxt-price;
  var nxtArrow=nxtDiff>0?'▲':nxtDiff<0?'▼':'→';
  var nxtCol=nxtDiff>0?'#18a045':nxtDiff<0?'#cc2020':'#888';
  C.font='800 10px "Segoe UI",sans-serif';C.textAlign='left';
  C.fillStyle='rgba(80,100,120,0.72)';C.fillText('Next',cx+16,cy+ch-8);
  C.font='900 13px "Segoe UI",sans-serif';
  C.fillStyle=nxtCol;C.fillText(nxtArrow,cx+43,cy+ch-8);
  C.font='900 14px "Segoe UI",sans-serif';
  C.fillText('$'+nxt,cx+57,cy+ch-8);
  // Sparkline (right portion, well-bounded)
  var chX=cx+cw*0.44,chY=cy+7,chW=cw*0.54,chH=ch-12;
  drawPriceSparkline(chX,chY,chW,chH,hist,fishType,nxt);
  C.textAlign='left';
}

  var sw=(hw-padL-gap-rightReserve)/4;
  var minHud=padL+gap+4*72;
  if(hw<minHud)hw=Math.min(W-16,minHud);
  sw=(hw-padL-gap)/4;
  var hx=(W-hw)/2;
  if(hx+hw>W-12)hx=Math.max(8,W-12-hw);
  hx=Math.max(8,hx-6);
  var hy=H-hh-bottomPad;
  var yRowStats=hy+78;
  C.fillStyle='rgba(255,255,255,0.96)';
  rr(hx,hy,hw,hh,22);C.fill();
  C.strokeStyle='rgba(160,195,220,0.9)';C.lineWidth=1.5;rr(hx,hy,hw,hh,22);C.stroke();
  // (no right-panel divider — time+prices moved to top bar below)
  for(var i=0;i<4;i++){
    var sx=hx+padL+i*sw,cxL=sx+sw*0.26,cxR=sx+sw*0.74,cxm=sx+sw*0.5;
    C.fillStyle='rgba(45,65,88,0.88)';C.font='800 12px "Segoe UI",system-ui,sans-serif';C.textAlign='left';
    C.fillText(PN[i],sx,hy+17);
    if(moneyFlash[i]>0){
      C.save();
      var mf=moneyFlash[i];
      C.globalAlpha=0.16+mf*0.42;
      C.fillStyle='#ffc93a';
      C.beginPath();C.arc(cxL,hy+54,25,0,Math.PI*2);C.fill();
      C.restore();
    }
    C.textAlign='center';
    var icY=hy+28;
    if(!drawHudIcon(imgHudMoney,cxL,icY,iconPx)){
      C.font='18px "Segoe UI Emoji","Apple Color Emoji",sans-serif';
      C.fillText('\uD83D\uDCB0',cxL,hy+36);
    }
    if(!drawHudIcon(imgHudMoral,cxR,icY,iconPx)){
      C.font='18px "Segoe UI Emoji","Apple Color Emoji",sans-serif';
      C.fillText('\u2696\uFE0F',cxR,hy+36);
    }
    C.fillStyle=PD[i];C.font='900 21px Arial,sans-serif';
    C.fillText('$'+G.players[i].money,cxL,hy+58);
    var mor=G.players[i].morality;
    C.fillText((mor>0?'+':'')+mor,cxR,hy+58);
    var rel=G.players[i].releases,st=G.players[i].steals;
    var rsLine='Release '+rel+'\uD83D\uDC1F  --  Stolen '+st+'\uD83D\uDC1F';
    C.fillStyle='rgba(45,70,95,0.96)';C.font='700 12px "Segoe UI",system-ui,sans-serif';
    if(C.measureText(rsLine).width>sw-4)C.font='700 11px "Segoe UI",system-ui,sans-serif';
    if(C.measureText(rsLine).width>sw-4)C.font='700 10px "Segoe UI",system-ui,sans-serif';
    C.textAlign='center';
    C.fillText(rsLine,cxm,yRowStats);
    C.textAlign='left';
    if(i<3){
      C.strokeStyle='rgba(0,0,0,0.06)';
      C.beginPath();C.moveTo(sx+sw,hy+14);C.lineTo(sx+sw,hy+hh-14);C.stroke();
    }
  }
  // ── Top bar: [Salmon] [Timer] [Tuna] — same height, shared top Y ───────
  var barH=68;
  var tcW=114,tcH=barH,tcY=20,tcX=Math.round(W/2-tcW/2);
  var pcW=Math.min(178,tcX-16),pcH=barH;
  // -- Timer card (center) --
  var timeCrit=gameTime<=10;
  var flashP=timeCrit?Math.abs(Math.sin(_t*Math.PI*1.4)):0;
  C.fillStyle='rgba(255,255,255,0.97)';
  rr(tcX,tcY,tcW,tcH,13);C.fill();
  if(timeCrit){
    C.save();C.globalAlpha=0.05+0.07*flashP;
    C.fillStyle='#e01010';rr(tcX,tcY,tcW,tcH,13);C.fill();C.restore();
  }
  C.strokeStyle=timeCrit?'rgba(200,30,30,'+(0.3+0.25*flashP).toFixed(2)+')':'rgba(160,195,220,0.9)';
  C.lineWidth=timeCrit?2:1.2;rr(tcX,tcY,tcW,tcH,13);C.stroke();
  var midY=tcY+tcH/2;
  if(!drawHudIcon(imgHudClock,tcX+17,midY,18)){
    C.save();C.textBaseline='middle';C.textAlign='center';
    C.font='14px "Segoe UI Emoji","Apple Color Emoji",sans-serif';
    C.fillStyle='#555';C.fillText('\uD83D\uDD50',tcX+17,midY);C.restore();
  }
  var mm=Math.floor(gameTime/60),ss=Math.floor(gameTime%60);
  var timeStr=mm+':'+(ss<10?'0':'')+ss;
  var timeCol=timeCrit?'rgba(195,25,10,'+(0.7+0.2*flashP).toFixed(2)+')':'#2c3e50';
  C.save();C.textBaseline='middle';C.textAlign='center';
  C.fillStyle=timeCol;C.font='bold '+(timeCrit?'23':'21')+'px "Segoe UI",Arial,sans-serif';
  C.fillText(timeStr,tcX+tcW/2+7,midY);C.restore();
  C.textAlign='left';
  // -- Salmon card (left of timer) --
  var salX=tcX-8-pcW,salY=tcY;
  if(salX>=4)drawFishPriceCard(salX,salY,pcW,pcH,'salmon');
  // -- Tuna card (right of timer) --
  var tunX=tcX+tcW+8,tunY=tcY;
  if(tunX+pcW<=W-4)drawFishPriceCard(tunX,tunY,pcW,pcH,'tuna');
}

function draw(ts){
  _t=ts/1000;
  C.clearRect(0,0,W,H);
  drawBackground();
  if(G)for(var j=0;j<G.seaweeds.length;j++)drawSeaweed(G.seaweeds[j]);
  drawBuildings();
  if(G){
    for(var j=0;j<G.ponds.length;j++)drawPond(G.ponds[j]);
  }
  drawParticleLayer('dust');
  if(G)for(var i=0;i<4;i++)drawPlayer(G.players[i]);
  drawParticleLayer('fx');
  if(G)drawPolice();
  drawHUD();
  if(G&&G.eco<=3){
    C.strokeStyle='rgba(220,60,50,'+(0.3+Math.sin(_t*5)*0.22)+')';
    C.lineWidth=10;C.strokeRect(0,0,W,H);
  }
}

function loop(ts){
  var dt=Math.min((ts-lastTs)/1000,0.1);lastTs=ts;
  update(dt);draw(ts);
  raf=requestAnimationFrame(loop);
}

function startGame(){
  mkGame();gameTime=180;running=true;
  prevMoney=[0,0,0,0];moneyFlash=[0,0,0,0];
  for(var si=0;si<4;si++)prevMoney[si]=G.players[si].money;
  document.getElementById('ss').style.display='none';
  if(spSparkleTimer){clearInterval(spSparkleTimer);spSparkleTimer=null;}
  sfxInit();
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume().catch(function(){});
  sfxStart();
  lastTs=performance.now();if(raf)cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}

function endGame(){
  running=false;police=null;
  var maxRel=Math.max.apply(null,G.players.map(function(p){return p.releases;}));
  var maxSt=Math.max.apply(null,G.players.map(function(p){return p.steals;}));
  var ranked=G.players.map(function(p){
    var eco=(p.releases===maxRel&&maxRel>0);
    var over=(p.steals===maxSt&&maxSt>0);
    var bonus=(eco?5:0)+(over?-5:0);
    return{p:p,eco:eco,over:over,bonus:bonus,rankScore:p.money+bonus};
  }).sort(function(a,b){
    if(b.rankScore!==a.rankScore)return b.rankScore-a.rankScore;
    if(b.p.morality!==a.p.morality)return b.p.morality-a.p.morality;
    return a.p.i-b.p.i;
  });
  function badgeHTML(r){
    var arr=[];
    if(r.eco)arr.push('<span class="res-badge eco">🌿 Eco Hero +5</span>');
    if(r.over)arr.push('<span class="res-badge over">🧹 Poacher -5</span>');
    return arr.join('');
  }
  function cardHTML(r,rank){
    var p=r.p;
    return '<article class="res-card rank'+rank+'">'+
      '<div class="res-avatar"><img src="assets/player'+(p.i+1)+'.png" alt="'+PN[p.i]+'"></div>'+
      '<div class="res-head">'+rank+'</div>'+
      '<div class="res-body">'+
        '<div class="res-badges">'+badgeHTML(r)+'</div>'+
        '<p class="res-pname" style="color:'+PC[p.i]+'">'+PN[p.i]+'</p>'+
        '<p class="res-money">$'+r.rankScore+'</p>'+
        (r.bonus!==0?'<p class="res-basemoney">base $'+p.money+(r.bonus>0?' <span style="color:#2a9a40">+'+r.bonus+'</span>':' <span style="color:#c43020">'+r.bonus+'</span>')+'</p>':'')+
        '<p class="res-moral">⚖ '+(p.morality>0?'+':'')+p.morality+' moral</p>'+
        '<div class="res-mini"><span><b>'+p.steals+'</b>steal</span><span><b>'+p.releases+'</b>release</span></div>'+
      '</div>'+
    '</article>';
  }
  var podium=[ranked[1],ranked[0],ranked[2]];
  document.getElementById('resPodium').innerHTML=
    cardHTML(podium[0],2)+cardHTML(podium[1],1)+cardHTML(podium[2],3);
  var r4=ranked[3],p4=r4.p;
  var r4MoneyTxt='$'+r4.rankScore;
  if(r4.bonus!==0){
    var bSign=r4.bonus>0?'+':'';
    r4MoneyTxt+=' <span style="font-size:14px;color:#888;font-weight:600">(base $'+p4.money+' '+bSign+r4.bonus+')</span>';
  }
  document.getElementById('resRow4').innerHTML=
    '<div class="res-row4-rank">4</div>'+
    '<div class="res-row4-avatar"><img src="assets/player'+(p4.i+1)+'.png" alt="'+PN[p4.i]+'"></div>'+
    '<div class="res-row4-name" style="color:'+PC[p4.i]+'">'+PN[p4.i]+
      (r4.eco?'<br><span class="res-badge eco" style="font-size:10px;padding:2px 6px">\uD83C\uDF3F Eco Hero +5</span>':'')+
      (r4.over?'<br><span class="res-badge over" style="font-size:10px;padding:2px 6px">\uD83E\uDDF9 Poacher \u22125</span>':'')+
    '</div>'+
    '<div class="res-row4-money">'+r4MoneyTxt+'</div>'+
    '<div class="res-row4-moral">\u2696 '+(p4.morality>0?'+':'')+p4.morality+'<span class="res-row4-lbl">moral</span></div>'+
    '<div class="res-row4-st">'+p4.steals+'<span class="res-row4-lbl">steal</span></div>'+
    '<div class="res-row4-rel">'+p4.releases+'<span class="res-row4-lbl">release</span></div>';
  document.getElementById('es').style.display='flex';
}

function resetGame(){
  cancelAnimationFrame(raf);G=null;running=false;keys={};mg=null;
  for(var ri=0;ri<4;ri++){gpPrevAct[ri]=false;gpPrevGrd[ri]=false;}
  document.getElementById('es').style.display='none';
  document.getElementById('ss').style.display='flex';
  randomizeStartPageFish();
  startSparkles();
  lastTs=performance.now();raf=requestAnimationFrame(loop);
}

randomizeStartPageFish();
startSparkles();
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('rb').addEventListener('click',resetGame);
lastTs=performance.now();raf=requestAnimationFrame(loop);
})();
